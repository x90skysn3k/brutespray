# Rapid7 ssh-badkeys snapshot + Vagrant insecure key
# Snapshotted from https://github.com/rapid7/ssh-badkeys (authorized/ and host/)
# Keys in the "authorized" category are client private keys known to be deployed
# on live systems as authorized_keys entries. Keys in the "host" category are SSH
# host private keys found embedded in router/device firmware.

# ── authorized keys (client keys with known default usernames) ─────────────────

- file: vagrant-default.key
  username: vagrant
  vendor: HashiCorp Vagrant
  cve: ""
  description: Vagrant insecure default SSH key (any Vagrant VM using the default insecure keypair)

